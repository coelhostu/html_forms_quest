kind = "web"
previewPath = "/"
title = "HTML Forms Quest"
version = "1.0.0"
id = "artifacts/html-forms-quest"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20904

[services.development]
run = "pnpm --filter @workspace/html-forms-quest run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/html-forms-quest", "run", "build" ]
publicDir = "artifacts/html-forms-quest/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20904"
BASE_PATH = "/"
